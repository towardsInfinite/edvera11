<!DOCTYPE html>
<html>

<head>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #F1EFF4;
            font-family: 'Inter', sans-serif;
        }

        .section {
            position: relative;
            padding: 7rem 0;
            overflow: hidden;
            background-color: #F1EFF4;
        }

        .bg-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            position: relative;
            z-index: 2;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            color: #2D2A32;
            font-weight: 400;
            text-align: center;
            margin-bottom: 5rem;
            letter-spacing: -0.02em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4rem;
            text-align: center;
        }

        h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: #2D2A32;
            font-weight: 400;
            margin-bottom: 1.5rem;
        }

        p {
            font-size: 1.05rem;
            color: #555;
            line-height: 1.6;
            margin: 0;
        }
    </style>
</head>

<body>

    <section class="section">
        <!-- Topographical SVG Background -->
        <svg class="bg-svg" viewBox="0 0 1440 600" preserveAspectRatio="xMidYMid slice"
            xmlns="http://www.w3.org/2000/svg">
            <g fill="none" stroke="#DCD8E3" stroke-width="1.2">
                <!-- Curve groups to simulate topological rings/waves -->
                <!-- Group 1 -->
                <path d="M-100 100 Q 200 600 500 300 T 1100 100 T 1500 500" />
                <path d="M-100 50 Q 180 500 480 200 T 1100 0 T 1500 400 " />
                <path d="M-100 0 Q 160 400 460 100 T 1100 -100 T 1500 300" />

                <!-- Group 2 intersecting/offset -->
                <path d="M-100 300 C 200 500, 300 200, 600 400 C 900 600, 1100 200, 1500 500" />
                <path d="M-100 350 C 200 570, 330 250, 630 450 C 930 650, 1130 250, 1500 550" />
                <path d="M-100 400 C 200 640, 360 300, 660 500 C 960 700, 1160 300, 1500 600" />
                <path d="M-100 450 C 200 710, 390 350, 690 550 C 990 750, 1190 350, 1500 650" />

                <!-- Group 3 (bottom left corner rings) -->
                <path d="M -50 700 C 100 500, 400 550, 600 700" />
                <path d="M -150 750 C 100 400, 500 450, 700 800" />

            </g>
        </svg>

        <div class="container">
            <h2>Outcomes</h2>
            <div class="grid">
                <div>
                    <h3>Clarity</h3>
                    <p>The ability to deconstruct complex problems into manageable logical steps.</p>
                </div>
                <div>
                    <h3>Confidence</h3>
                    <p>Intellectual self-assurance that comes from mastering difficult concepts.</p>
                </div>
                <div>
                    <h3>Structure</h3>
                    <p>A disciplined approach to thinking that serves across all academic subjects.</p>
                </div>
            </div>
        </div>
    </section>

</body>

</html>
